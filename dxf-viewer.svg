  <g fill="#ffd700">
    <circle cx="56" cy="80" r="5"/>
    <circle cx="200" cy="80" r="5"/>
    <circle cx="56" cy="176" r="5"/>
    <circle cx="200" cy="176" r="5"/>
  </g>
